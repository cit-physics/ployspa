<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code - Ploy Spa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="bg-white border-b sticky top-0 z-10 no-print">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="admin.html" class="text-pink-500 hover:text-pink-600 text-sm">← Admin</a>
        <span class="text-gray-300">|</span>
        <h1 class="text-lg font-semibold text-gray-800" data-i18n="qrTitle"></h1>
      </div>
      <div class="flex items-center gap-3">
        <div id="lang-toggle" class="flex gap-1"></div>
        <button id="btn-logout" class="text-xs text-gray-500 hover:text-red-500 border px-2 py-1 rounded hidden">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6">
    <div class="bg-white rounded-2xl shadow-sm p-6 no-print">
      <p class="text-gray-600 text-sm mb-4" data-i18n="qrSubtitle"></p>

      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">URL หน้า Check-in</label>
        <input type="text" id="checkin-url" class="w-full border rounded-lg px-3 py-2 text-sm font-mono" />
        <p class="text-xs text-gray-500 mt-1">URL จะอัปเดต QR อัตโนมัติเมื่อพิมพ์</p>
      </div>

      <div class="flex gap-2">
        <button id="btn-print" class="px-4 py-2 bg-pink-500 text-white text-sm font-medium rounded-lg hover:bg-pink-600" data-i18n="qrPrint"></button>
        <button id="btn-download" class="px-4 py-2 border border-gray-300 text-gray-700 text-sm rounded-lg hover:bg-gray-50">⬇ Download PNG</button>
      </div>
    </div>

    <!-- Print area -->
    <div id="print-area" class="bg-white rounded-2xl shadow-sm p-8 mt-6 text-center">
      <h2 class="text-3xl font-bold text-pink-600 mb-1">Ploy Spa</h2>
      <p class="text-gray-500 text-sm mb-6">สแกนเพื่อเช็กอิน / Scan to check-in</p>

      <div class="flex justify-center mb-6">
        <canvas id="qr-canvas" class="border-4 border-pink-100 rounded-2xl"></canvas>
      </div>

      <div class="space-y-2">
        <p class="text-lg font-semibold text-gray-800">📱 พนักงานสแกน QR นี้</p>
        <p class="text-base text-gray-600">Staff scan this QR code</p>
        <p class="text-xs text-gray-400 mt-3" id="display-url"></p>
      </div>
    </div>
  </main>

  <script type="module">
    import { t } from "./js/i18n.js";
    import { requireAuth, logout } from "./js/auth.js";

    await requireAuth();
    document.getElementById("btn-logout").classList.remove("hidden");
    document.getElementById("btn-logout").addEventListener("click", async () => {
      await logout();
      location.replace("login.html");
    });

    const $ = (id) => document.getElementById(id);

    // Default URL = current site + checkin.html
    const defaultUrl = new URL("checkin.html", window.location.href).toString();
    $("checkin-url").value = defaultUrl;

    function generate(url) {
      QRCode.toCanvas($("qr-canvas"), url, {
        width: 320,
        margin: 2,
        color: { dark: "#db2777", light: "#ffffff" },
      }, (err) => { if (err) console.error(err); });
      $("display-url").textContent = url;
    }

    generate(defaultUrl);

    $("checkin-url").addEventListener("input", (e) => {
      const url = e.target.value.trim();
      if (url) generate(url);
    });

    $("btn-print").addEventListener("click", () => window.print());

    $("btn-download").addEventListener("click", () => {
      const link = document.createElement("a");
      link.download = "ployspa-qr.png";
      link.href = $("qr-canvas").toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
