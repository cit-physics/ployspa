<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>จัดการ Booking — PloySpa Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f9f5f7; color: #2d2d2d; }
    .spinner { width:32px; height:32px; border:3px solid #fce7f3; border-top-color:#ec4899; border-radius:50%; animation:spin .7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform:rotate(360deg); } }

    table.tbl {
      width:100%; border-collapse:collapse; background:#fff;
      border-radius:10px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,.06);
      font-size:13px;
    }
    .tbl thead th {
      background:#e0e7ff; color:#312e81; font-weight:700; padding:10px 8px;
      border-bottom:2px solid #a5b4fc; text-align:center; font-size:12px;
      white-space:nowrap;
    }
    .tbl tbody td {
      padding:10px 8px; border-bottom:1px solid #e5e7eb; text-align:center;
      vertical-align: middle;
    }
    .tbl tbody tr:hover td { background:#eef2ff; }
    .col-name { text-align:left !important; font-weight:600; min-width:90px; }
    .col-time { white-space:nowrap; font-variant-numeric: tabular-nums; }

    .badge { display:inline-block; padding:2px 8px; border-radius:8px; font-weight:600; font-size:11px; }
    .badge-pending { background:#fef3c7; color:#92400e; }
    .badge-confirmed { background:#d1fae5; color:#065f46; }
    .badge-cancelled { background:#fee2e2; color:#991b1b; }

    .btn-edit { background:#6366f1; color:#fff; padding:4px 10px; border-radius:6px; font-size:12px; }
    .btn-edit:hover { background:#4f46e5; }
    .btn-cancel { background:#ef4444; color:#fff; padding:4px 10px; border-radius:6px; font-size:12px; }
    .btn-cancel:hover { background:#dc2626; }
    .btn-restore { background:#10b981; color:#fff; padding:4px 10px; border-radius:6px; font-size:12px; }
    .btn-restore:hover { background:#059669; }

    /* Modal */
    .modal-bg {
      position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex;
      align-items:center; justify-content:center; z-index:50;
    }
    .modal-card {
      background:#fff; border-radius:12px; padding:24px; max-width:480px; width:90%;
    }
  </style>
</head>
<body class="min-h-screen pb-20">

<header class="bg-white border-b border-pink-200 sticky top-0 z-20 shadow-sm">
  <div class="max-w-6xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
    <a href="admin.html" class="text-pink-500 hover:text-pink-600 text-sm">← Admin</a>
    <span class="text-gray-300">|</span>
    <h1 class="text-base font-bold text-gray-800 flex-1">📅 จัดการ Booking</h1>
    <button id="btn-prev" class="px-2 py-1 border rounded-lg text-sm hover:bg-gray-50">‹</button>
    <input type="date" id="date-picker" class="border rounded-lg px-3 py-1.5 text-sm focus:ring-2 focus:ring-indigo-300" />
    <button id="btn-next" class="px-2 py-1 border rounded-lg text-sm hover:bg-gray-50">›</button>
    <button id="btn-today" class="px-3 py-1 bg-indigo-100 text-indigo-700 text-sm rounded-lg hover:bg-indigo-200 font-medium">วันนี้</button>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 pt-4">
  <div class="text-sm text-gray-600 mb-3">
    แสดง booking ที่ <strong>ยังไม่ได้เริ่ม session</strong> ในวันที่เลือก — แก้ไข/ยกเลิกได้
    <br>
    <span class="text-xs text-gray-500">(หลังเริ่ม session แล้ว แก้ไขได้ที่ <a href="admin-sessions.html" class="text-indigo-500 underline">จัดการ Session</a>)</span>
  </div>

  <div id="loading" class="text-center py-16 text-gray-400">
    <div class="spinner mb-3"></div>
    <p>กำลังโหลด…</p>
  </div>
  <div id="empty" class="hidden text-center py-16 text-gray-400">
    <div class="text-4xl mb-3">📭</div>
    <p>ไม่มี booking ในวันนี้</p>
  </div>

  <div id="table-wrap" class="hidden overflow-x-auto pb-4">
    <table class="tbl">
      <thead>
        <tr>
          <th>#</th>
          <th>เวลา</th>
          <th>หมอ</th>
          <th>ลูกค้า</th>
          <th>สถานะ</th>
          <th>แหล่ง</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</main>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-bg hidden">
  <div class="modal-card">
    <h2 class="text-lg font-bold mb-4">✏️ แก้ไข Booking</h2>
    <form id="edit-form" class="space-y-3">
      <input type="hidden" id="f-id" />
      <div>
        <label class="block text-xs text-gray-600 mb-1">หมอ</label>
        <input type="text" id="f-therapist" readonly class="w-full bg-gray-100 border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">วันที่</label>
        <input type="date" id="f-date" required class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">เวลา (HH:MM)</label>
        <input type="text" id="f-time" required pattern="^([01]?\d|2[0-3]):[0-5]\d$" placeholder="14:00" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">ชื่อลูกค้า</label>
        <input type="text" id="f-customer" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-xs text-gray-600 mb-1">หมายเหตุ (admin)</label>
        <input type="text" id="f-note" class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-300" placeholder="—" />
      </div>
      <div class="flex justify-end gap-2 pt-3">
        <button type="button" id="btn-cancel-edit" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg text-sm">ยกเลิก</button>
        <button type="submit" class="px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 text-sm font-medium">บันทึก</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import {
  db, collection, doc, getDocs, query, where, updateDoc, serverTimestamp,
} from "./js/firebase-config.js";
import { requireAuth } from "./js/auth.js";
import {
  listTherapists, escapeHtml, getBusinessDate, shiftDate,
} from "./js/helpers.js";

await requireAuth();

const $ = id => document.getElementById(id);

let therapists = [];
let bookings = [];

// =========================================================
// DATE
// =========================================================
const urlDate = new URLSearchParams(location.search).get("date");
let selectedDate = urlDate && /^\d{4}-\d{2}-\d{2}$/.test(urlDate) ? urlDate : getBusinessDate();
$("date-picker").value = selectedDate;

$("date-picker").addEventListener("change", e => {
  selectedDate = e.target.value;
  load();
});
$("btn-prev").addEventListener("click", () => {
  selectedDate = shiftDate(selectedDate, -1);
  $("date-picker").value = selectedDate;
  load();
});
$("btn-next").addEventListener("click", () => {
  selectedDate = shiftDate(selectedDate, 1);
  $("date-picker").value = selectedDate;
  load();
});
$("btn-today").addEventListener("click", () => {
  selectedDate = getBusinessDate();
  $("date-picker").value = selectedDate;
  load();
});

// =========================================================
// HELPERS
// =========================================================
function stripPrefix(name) {
  return String(name || "").replace(/^(น้อง|พี่)\s*/, "").trim();
}
function nong(t) {
  if (!t) return "—";
  const raw = t.nameTh || t.nameEn || t.code || "?";
  const stripped = stripPrefix(raw);
  return stripped ? `น้อง${stripped}` : "—";
}
function statusBadge(status) {
  if (status === "cancelled")              return `<span class="badge badge-cancelled">ยกเลิก</span>`;
  if (status === "confirmed")              return `<span class="badge badge-confirmed">ยืนยัน</span>`;
  if (status === "pending_confirmation")   return `<span class="badge badge-pending">รอยืนยัน</span>`;
  return `<span class="badge">${escapeHtml(status || "?")}</span>`;
}
function sourceLabel(source) {
  if (source === "web") return "🌐 เว็บ";
  if (source === "line_bot" || source === "customer") return "💬 ลูกค้า";
  if (source === "admin_group" || source === "admin_manual") return "👤 แอดมิน";
  return source || "—";
}

// =========================================================
// LOAD
// =========================================================
async function load() {
  $("loading").classList.remove("hidden");
  $("table-wrap").classList.add("hidden");
  $("empty").classList.add("hidden");

  if (therapists.length === 0) therapists = await listTherapists();

  // Query bookings ของวันที่เลือก — ทุก status (ยกเว้น session ที่ link แล้ว)
  const snap = await getDocs(query(
    collection(db, "bookings"),
    where("bookingDate", "==", selectedDate)
  ));
  bookings = snap.docs
    .map(d => ({ id: d.id, ...d.data() }))
    .filter(b => !b.sessionId)  // session เริ่มแล้ว → ไป admin-sessions
    .sort((a, b) => (a.bookingTime || "").localeCompare(b.bookingTime || ""));

  $("loading").classList.add("hidden");
  if (bookings.length === 0) {
    $("empty").classList.remove("hidden");
    return;
  }
  renderTable();
  $("table-wrap").classList.remove("hidden");
}

function renderTable() {
  const tbody = $("rows");
  tbody.innerHTML = bookings.map((b, idx) => {
    const t = therapists.find(x => x.id === b.therapistId);
    const therapistName = t ? nong(t) : (b.therapistName ? `น้อง${stripPrefix(b.therapistName)}` : "—");
    const isCancelled = b.status === "cancelled";
    const actions = isCancelled
      ? `<button class="btn-restore" data-act="restore" data-id="${b.id}">↻ คืนสภาพ</button>`
      : `<button class="btn-edit" data-act="edit" data-id="${b.id}">✏️ แก้ไข</button>
         <button class="btn-cancel" data-act="cancel" data-id="${b.id}">✗ ยกเลิก</button>`;
    return `
      <tr ${isCancelled ? 'style="opacity:.5;"' : ''}>
        <td>${idx + 1}</td>
        <td class="col-time">${escapeHtml(b.bookingTime || "—")}</td>
        <td class="col-name">${escapeHtml(therapistName)}</td>
        <td class="col-name">${escapeHtml(b.customerName ? `คุณ${stripPrefix(b.customerName)}` : "—")}</td>
        <td>${statusBadge(b.status)}</td>
        <td>${escapeHtml(sourceLabel(b.source))}</td>
        <td>${actions}</td>
      </tr>
    `;
  }).join("");

  // Bind actions
  tbody.querySelectorAll("[data-act='edit']").forEach(btn => {
    btn.addEventListener("click", () => openEditModal(btn.dataset.id));
  });
  tbody.querySelectorAll("[data-act='cancel']").forEach(btn => {
    btn.addEventListener("click", () => cancelBooking(btn.dataset.id));
  });
  tbody.querySelectorAll("[data-act='restore']").forEach(btn => {
    btn.addEventListener("click", () => restoreBooking(btn.dataset.id));
  });
}

// =========================================================
// EDIT MODAL
// =========================================================
function openEditModal(id) {
  const b = bookings.find(x => x.id === id);
  if (!b) return;
  const t = therapists.find(x => x.id === b.therapistId);
  $("f-id").value = b.id;
  $("f-therapist").value = t ? (t.nameTh || t.nameEn || t.code) : (b.therapistName || "?");
  $("f-date").value = b.bookingDate || "";
  $("f-time").value = b.bookingTime || "";
  $("f-customer").value = b.customerName || "";
  $("f-note").value = b.adminNote || "";
  $("edit-modal").classList.remove("hidden");
}

$("btn-cancel-edit").addEventListener("click", () => $("edit-modal").classList.add("hidden"));

$("edit-form").addEventListener("submit", async e => {
  e.preventDefault();
  const id = $("f-id").value;
  const date = $("f-date").value;
  const time = $("f-time").value.trim();
  const customer = $("f-customer").value.trim();
  const note = $("f-note").value.trim();

  if (!/^([01]?\d|2[0-3]):[0-5]\d$/.test(time)) {
    alert("เวลาไม่ถูกต้อง (รูปแบบ HH:MM เช่น 14:00)");
    return;
  }

  try {
    await updateDoc(doc(db, "bookings", id), {
      bookingDate: date,
      bookingTime: time,
      customerName: customer || null,
      adminNote: note || null,
      updatedAt: serverTimestamp(),
    });
    $("edit-modal").classList.add("hidden");
    await load();
  } catch (err) {
    console.error(err);
    alert("บันทึกไม่สำเร็จ: " + err.message);
  }
});

// =========================================================
// CANCEL / RESTORE
// =========================================================
async function cancelBooking(id) {
  const b = bookings.find(x => x.id === id);
  if (!b) return;
  const t = therapists.find(x => x.id === b.therapistId);
  const tName = t ? nong(t) : (b.therapistName || "?");
  if (!confirm(`ยกเลิก booking ของ ${tName} เวลา ${b.bookingTime} น.?`)) return;
  try {
    await updateDoc(doc(db, "bookings", id), {
      status: "cancelled",
      updatedAt: serverTimestamp(),
    });
    await load();
  } catch (err) {
    console.error(err);
    alert("ยกเลิกไม่สำเร็จ: " + err.message);
  }
}

async function restoreBooking(id) {
  if (!confirm("คืนสภาพ booking นี้ (กลับเป็น 'รอยืนยัน')?")) return;
  try {
    await updateDoc(doc(db, "bookings", id), {
      status: "pending_confirmation",
      updatedAt: serverTimestamp(),
    });
    await load();
  } catch (err) {
    console.error(err);
    alert("คืนสภาพไม่สำเร็จ: " + err.message);
  }
}

// =========================================================
// INIT
// =========================================================
await load();
</script>
</body>
</html>
